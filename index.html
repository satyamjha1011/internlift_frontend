    <script>
      window.dataLayer = window.dataLayer || [];
      window.gtag = function gtag(){ window.dataLayer.push(arguments); };
      window.gtag('js', new Date());
      window.gtag('config', 'G-LJM51KMQTE');
      (function loadDeferredThirdPartyScripts() {
        let hasLoadedAnalytics = false;
        let hasLoadedAds = false;

        const appendScript = (config) => {
          const scriptTag = document.createElement('script');
          scriptTag.src = config.src;
          scriptTag.async = !!config.async;
          if (config.attrs) {
            Object.entries(config.attrs).forEach(([key, value]) => scriptTag.setAttribute(key, value));
          }
          document.head.appendChild(scriptTag);
        };

        const loadAnalytics = () => {
          if (hasLoadedAnalytics) return;
          hasLoadedAnalytics = true;
          const scriptConfigs = [
            { src: 'https://www.googletagmanager.com/gtag/js?id=G-LJM51KMQTE', async: true },
            { src: 'https://www.googletagmanager.com/gtm.js?id=GTM-NMTT9DSK', async: true },
          ];

          scriptConfigs.forEach(appendScript);
        };

        const loadAdsense = () => {
          if (hasLoadedAds) return;
          hasLoadedAds = true;
          appendScript({
            src: 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7680957823986334',
            async: true,
            attrs: { crossorigin: 'anonymous' },
          });

          window.removeEventListener('pointerdown', loadAdsense);
          window.removeEventListener('scroll', loadAdsense);
          window.removeEventListener('keydown', loadAdsense);
        };

        window.addEventListener('pointerdown', loadAdsense, { once: true, passive: true });
        window.addEventListener('scroll', loadAdsense, { once: true, passive: true });
        window.addEventListener('keydown', loadAdsense, { once: true, passive: true });

        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(loadAnalytics, { timeout: 10000 });
        } else {
          window.setTimeout(loadAnalytics, 10000);
        }
      })();
    </script>
