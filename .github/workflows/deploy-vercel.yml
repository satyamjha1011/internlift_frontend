name: Deploy to Vercel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Check if secrets are configured
        id: check
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ Vercel secrets are not configured!"
            echo ""
            echo "To enable Vercel deployment via GitHub Actions:"
            echo "1. Go to your GitHub repository → Settings → Secrets and variables → Actions"
            echo "2. Add these three secrets:"
            echo "   - VERCEL_TOKEN (get from vercel.com → Settings → Tokens)"
            echo "   - VERCEL_ORG_ID (get from Vercel project → Settings → General)"
            echo "   - VERCEL_PROJECT_ID (get from Vercel project → Settings → General)"
            echo ""
            echo "📖 See SETUP_SECRETS.md for detailed instructions"
            echo ""
            echo "💡 Tip: You can also use Vercel's built-in GitHub integration (easier!)"
            echo "   Just connect your repo in Vercel dashboard - no GitHub Actions needed!"
            exit 0
          else
            echo "configured=true" >> $GITHUB_OUTPUT
            echo "✅ All Vercel secrets are configured!"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.configured == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL || '/' }}

      - name: Deploy to Vercel
        run: npx vercel@latest --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
